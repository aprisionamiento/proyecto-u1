<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/styles.css">
    <title>Circle</title>
</head>

<body class="body">

    <div class="navbar">        
        <div class="logo">
            CIRCLE
        </div>

        <div class="menu-items">
            <p>Features</p>
            <p>Pricing</p>
            <p>About Us</p>
        </div>

        <div class="cta">
            <div class="login">
                Customer Login
            </div>

            <div class="signup">
                <button>Sign up</button>
            </div>
        </div>
        <div class="hamburger">
            <img src="./vendor/assets/hamburger.svg" alt="Hamburger Menu">
        </div>
        <div class="overlay hidden"></div>
        <nav class="sidebar hidden">
        <a href="#">Features</a>
        <a href="#">Pricing</a>
        <a href="#">Resources</a>
        <a href="#">About</a>
        </nav>
        </nav>
    </div>

    <section class="hero">

        <p class="hero-subtitle">
            An AI tool made for conversion rate optimization
        </p>
        <h1 class="hero-title">
            Increase your <br>
            conversion rate <span>using AI</span>
        </h1>
        <button class="hero-button">
            Create account
        </button>
        <div class="hero-info">
            <p>30 Days free trial</p>
            <p>|</p>
            <p>No credit card required</p>
        </div>

    </section>

    <section class="dashboard">
        <img src="./vendor/assets/dashboard.png" alt="Dashboard">
    </section>
    <section class="tablet">
        <img src="./vendor/assets/tablet.png" alt="Tablet">
    </section>
    <section class="mobile">
        <img src="./vendor/assets/mobile.png" alt="Mobile">
    </section>
<script src="./scripts/script.js"></script>
</body>
</html>
